<div class="auth-page">
  <!-- Left panel — decorative -->
  <div class="auth-hero">
    <div class="auth-hero-overlay"></div>
    <div class="auth-hero-content">
      <span class="auth-hero-label">WELCOME</span>
      <h2 class="auth-hero-title">Begin a more<br>considered way to<br>shop.</h2>
    </div>
  </div>

  <!-- Right panel — form -->
  <div class="auth-form-panel">
    <div class="auth-form-wrapper">
      <span class="auth-form-label">NEW ACCOUNT</span>
      <h1 class="auth-form-title">Create account</h1>
      <p class="auth-form-subtitle">One quiet step to start collecting.</p>

      <div class="auth-error" *ngIf="errorMessage">
        <i class="bi bi-exclamation-circle"></i> {{ errorMessage }}
      </div>

      <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
        <div class="form-field">
          <label class="form-label">NAME</label>
          <input
            type="text"
            formControlName="name"
            class="form-input"
            placeholder="Jane Doe"
            id="signup-name"
          />
          <div class="form-error" *ngIf="signupForm.get('name')?.touched && signupForm.get('name')?.errors?.['required']">
            Name is required
          </div>
        </div>

        <div class="form-field">
          <label class="form-label">EMAIL</label>
          <input
            type="email"
            formControlName="email"
            class="form-input"
            placeholder="you@example.com"
            id="signup-email"
          />
          <div class="form-error" *ngIf="signupForm.get('email')?.touched && signupForm.get('email')?.errors?.['required']">
            Email is required
          </div>
          <div class="form-error" *ngIf="signupForm.get('email')?.touched && signupForm.get('email')?.errors?.['email']">
            Please enter a valid email
          </div>
        </div>

        <div class="form-field">
          <label class="form-label">PASSWORD</label>
          <input
            type="password"
            formControlName="password"
            class="form-input"
            placeholder="At least 6 characters"
            id="signup-password"
          />
          <div class="form-error" *ngIf="signupForm.get('password')?.touched && signupForm.get('password')?.errors?.['required']">
            Password is required
          </div>
          <div class="form-error" *ngIf="signupForm.get('password')?.touched && signupForm.get('password')?.errors?.['minlength']">
            Password must be at least 6 characters
          </div>
        </div>

        <button
          type="submit"
          class="btn-submit"
          [disabled]="signupForm.invalid || loading"
          id="signup-submit"
        >
          <span *ngIf="!loading">CREATE ACCOUNT</span>
          <span *ngIf="loading">CREATING...</span>
        </button>
      </form>

      <p class="auth-switch">
        Already have an account? <a routerLink="/auth/login">Sign in</a>
      </p>
    </div>
  </div>
</div>
